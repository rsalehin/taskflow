<div class="task-card" [class.completed]="task.status === 'done'">

  <div class="task-header">
    <h3 class="task-title">{{ task.title }}</h3>
    <span class="priority-badge priority-{{ task.priority }}">
      {{ task.priority }}
    </span>
  </div>

  <p class="task-description">{{ task.description }}</p>

  <div class="task-meta">
    <span>📅 {{ task.dueDate }}</span>
    <span class="status-badge status-{{ task.status }}">
      {{ task.status }}
    </span>
  </div>

  <div class="task-progress">
    <span>Fortschritt: {{ task.progress }}%</span>
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="task.progress"></div>
    </div>
  </div>

  <div class="task-footer">
    <div class="assignee-avatar">{{ task.assignee.initials }}</div>
    <span class="assignee-name">{{ task.assignee.name }}</span>

    <div class="task-actions">
      <!-- toggleStatus Event nach oben schicken -->
      <button
        class="btn-toggle"
        (click)="onToggleStatus()"
        [title]="task.status === 'done' ? 'Als offen markieren' : 'Als erledigt markieren'">
        {{ task.status === 'done' ? '↩ Öffnen' : '✓ Erledigt' }}
      </button>

      <!-- deleteTask Event nach oben schicken -->
      <button
        class="btn-delete"
        (click)="onDelete()"
        title="Task löschen">
        🗑
      </button>
    </div>
  </div>

</div>
